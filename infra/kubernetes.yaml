apiVersion: v1
kind: ConfigMap
metadata:
  name: reverse-democracy-config
data:
  LLM_PROVIDER: heuristic
  NEO4J_URI: neo4j://neo4j:7687
  NEO4J_USER: neo4j
---
apiVersion: v1
kind: Secret
metadata:
  name: reverse-democracy-secrets
type: Opaque
stringData:
  NEO4J_PASSWORD: password
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-democracy-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reverse-democracy-app
  template:
    metadata:
      labels:
        app: reverse-democracy-app
    spec:
      containers:
        - name: app
          image: reverse-democracy-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: reverse-democracy-config
            - secretRef:
                name: reverse-democracy-secrets
          readinessProbe:
            httpGet:
              path: /api/problems
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: reverse-democracy-app
spec:
  selector:
    app: reverse-democracy-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
            - containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: neo4j/password
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector:
    app: neo4j
  ports:
    - name: browser
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
